    <script>
        const CORRECT_PASSWORD = "20250629"; // 

        function checkPassword() {
            const input = document.getElementById('pw-input').value;
            if (input === CORRECT_PASSWORD) {
                document.getElementById('password-gate').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                render();
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        

        // 未來要增加券種，只需在這裡增加物件

            { id: 4, title: "全身精油按摩 60min", desc: "有效解除一整天的疲勞，含肩頸加強。" },
            { id: 5, title: "全身精油按摩 60min", desc: "有效解除一整天的疲勞，含肩頸加強。" },
            { id: 6, title: "局部精油油壓 30min", desc: "針對不適的患部著重加強，舒緩肌肉僵硬的緊繃感。" },
            { id: 7, title: "局部精油油壓 30min", desc: "針對不適的患部著重加強，舒緩肌肉僵硬的緊繃感。" },

            { id: 12, title: "局部精油指壓 30min", desc: "針對不適的患部著重加強，舒緩肌肉僵硬的緊繃感。" },

            { id: 20, title: "足底精油按摩 20min", desc: "緩解足部的痠痛，隔天有如Tadashi一般勇猛。" },
        ];

        function render() {
    const activeContainer = document.getElementById('active-coupons');
    const usedContainer = document.getElementById('used-coupons');
    
    // 1. 先清空容器內容，避免重複渲染
    activeContainer.innerHTML = '';
    usedContainer.innerHTML = '';

    const usedIds = JSON.parse(localStorage.getItem('usedCoupons') || '[]');

    // 2. 確保使用 += 來累加每一張券
    couponData.forEach(coupon => {
        const isUsed = usedIds.includes(coupon.id);
        
        // 這裡我們把 HTML 結構整理好
        const couponHTML = `
            <div class="coupon ${isUsed ? 'used' : ''}">
                <div class="stamp">Archive / Used</div>
                <div class="coupon-content">
                    <div class="coupon-title">${coupon.title}</div>
                    <div class="coupon-desc">${coupon.desc}</div>
                </div>
                ${isUsed ? '' : `<button onclick="useCoupon(${coupon.id})">兌換</button>`}
            </div>
        `;

        // 3. 根據狀態放入對應的容器
        if (isUsed) {
            usedContainer.innerHTML += couponHTML; // 使用 += 累加
        } else {
            activeContainer.innerHTML += couponHTML; // 使用 += 累加
        }
    });
}

        window.useCoupon = function(id) {
            if(confirm("是否確定使用？確認後將無法退回！")) {
                let usedIds = JSON.parse(localStorage.getItem('usedCoupons') || '[]');
                usedIds.push(id);
                localStorage.setItem('usedCoupons', JSON.stringify(usedIds));
                render();
            }
        }
    </script>
<script src="script.js"></script>
</html>
